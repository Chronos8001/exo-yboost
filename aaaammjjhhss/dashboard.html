<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        input[type="text"], select {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .pokemon-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .pokemon-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .pokemon-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .pokemon-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .pokemon-info {
            padding: 20px;
        }

        .pokemon-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .pokemon-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .pokemon-id {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .pokemon-types {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .type-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            color: white;
        }

        .type-plante { background: #78c850; }
        .type-poison { background: #a040a0; }
        .type-feu { background: #f08030; }
        .type-eau { background: #6890f0; }
        .type-insecte { background: #a8b820; }
        .type-normal { background: #a8a878; }
        .type-vol { background: #a890f0; }
        .type-electrik { background: #f8d030; color: #333; }
        .type-fée { background: #ee99ac; }

        .pokemon-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-name {
            font-size: 0.9em;
            color: #666;
        }

        .stat-value-small {
            font-weight: bold;
            color: #667eea;
        }

        .pokemon-created {
            font-size: 0.85em;
            color: #999;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #000;
        }

        .modal-header {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 30px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }

        .modal-image {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .modal-title {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .modal-title h2 {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }

        .modal-title .pokemon-id {
            width: fit-content;
        }

        .modal-body {
            display: grid;
            gap: 20px;
        }

        .detail-section {
            display: grid;
            gap: 10px;
        }

        .detail-section h3 {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }

        .detail-label {
            color: #666;
            font-weight: 500;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .pokemon-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .modal-header {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .modal-image {
                margin: 0 auto;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ Pokemon Dashboard</h1>
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by name...">
                    <select id="typeFilter">
                        <option value="">All Types</option>
                    </select>
                </div>
                <button onclick="resetFilters()">Reset Filters</button>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalPokemon">0</div>
                    <div class="stat-label">Total Pokemon</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgHP">0</div>
                    <div class="stat-label">Avg HP</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgCP">0</div>
                    <div class="stat-label">Avg CP</div>
                </div>
            </div>
        </header>

        <div id="loading" class="loading">Loading Pokemon data...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="noResults" class="no-results" style="display: none;">No Pokemon found matching your filters.</div>
        <div id="pokemonGrid" class="pokemon-grid"></div>
    </div>

    <!-- Modal for Pokemon Details -->
    <div id="pokemonModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <div class="modal-image">
                    <img id="modalImage" src="" alt="Pokemon">
                </div>
                <div class="modal-title">
                    <h2 id="modalName"></h2>
                    <span class="pokemon-id" id="modalId"></span>
                </div>
            </div>
            <div class="modal-body">
                <div class="detail-section">
                    <h3>Stats</h3>
                    <div class="detail-row">
                        <span class="detail-label">HP</span>
                        <span class="detail-value" id="modalHP"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">CP (Combat Power)</span>
                        <span class="detail-value" id="modalCP"></span>
                    </div>
                </div>
                <div class="detail-section">
                    <h3>Types</h3>
                    <div id="modalTypes" class="pokemon-types"></div>
                </div>
                <div class="detail-section">
                    <h3>Information</h3>
                    <div class="detail-row">
                        <span class="detail-label">Created</span>
                        <span class="detail-value" id="modalCreated"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allPokemons = [];
        let filteredPokemons = [];

        const typeColors = {
            'Plante': 'type-plante',
            'Poison': 'type-poison',
            'Feu': 'type-feu',
            'Eau': 'type-eau',
            'Insecte': 'type-insecte',
            'Normal': 'type-normal',
            'Vol': 'type-vol',
            'Electrik': 'type-electrik',
            'Fée': 'type-fée'
        };

        // Fetch Pokemon data from API
        async function loadPokemons() {
            try {
                const response = await fetch('/api/pokemons');
                const result = await response.json();
                
                if (result.data) {
                    allPokemons = result.data;
                    filteredPokemons = [...allPokemons];
                    
                    populateTypeFilter();
                    updateStats();
                    renderPokemons();
                    
                    document.getElementById('loading').style.display = 'none';
                } else {
                    throw new Error('Invalid data format');
                }
            } catch (error) {
                console.error('Error loading pokemons:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error loading Pokemon data. Make sure the server is running on http://localhost:3003';
            }
        }

        // Populate type filter dropdown
        function populateTypeFilter() {
            const types = new Set();
            allPokemons.forEach(pokemon => {
                pokemon.types.forEach(type => types.add(type));
            });

            const select = document.getElementById('typeFilter');
            Array.from(types).sort().forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                option.textContent = type;
                select.appendChild(option);
            });
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalPokemon').textContent = filteredPokemons.length;
            
            if (filteredPokemons.length > 0) {
                const avgHP = (filteredPokemons.reduce((sum, p) => sum + p.hp, 0) / filteredPokemons.length).toFixed(1);
                const avgCP = (filteredPokemons.reduce((sum, p) => sum + p.cp, 0) / filteredPokemons.length).toFixed(1);
                
                document.getElementById('avgHP').textContent = avgHP;
                document.getElementById('avgCP').textContent = avgCP;
            }
        }

        // Apply filters
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedType = document.getElementById('typeFilter').value;

            filteredPokemons = allPokemons.filter(pokemon => {
                const matchesSearch = pokemon.name.toLowerCase().includes(searchTerm);
                const matchesType = !selectedType || pokemon.types.includes(selectedType);
                return matchesSearch && matchesType;
            });

            updateStats();
            renderPokemons();
        }

        // Render Pokemon cards
        function renderPokemons() {
            const grid = document.getElementById('pokemonGrid');
            const noResults = document.getElementById('noResults');

            if (filteredPokemons.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            grid.innerHTML = filteredPokemons.map(pokemon => `
                <div class="pokemon-card" onclick="openModal(${pokemon.id})">
                    <div class="pokemon-image">
                        <img src="${pokemon.picture}" alt="${pokemon.name}" onload="this.style.opacity=1" style="opacity: 0; transition: opacity 0.3s;">
                    </div>
                    <div class="pokemon-info">
                        <div class="pokemon-header">
                            <div class="pokemon-name">${pokemon.name}</div>
                            <div class="pokemon-id">#${pokemon.id}</div>
                        </div>
                        <div class="pokemon-types">
                            ${pokemon.types.map(type => `
                                <span class="type-badge ${typeColors[type] || ''}">${type}</span>
                            `).join('')}
                        </div>
                        <div class="pokemon-stats">
                            <div class="stat">
                                <span class="stat-name">HP</span>
                                <span class="stat-value-small">${pokemon.hp}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-name">CP</span>
                                <span class="stat-value-small">${pokemon.cp}</span>
                            </div>
                        </div>
                        <div class="pokemon-created">${new Date(pokemon.created).toLocaleDateString()}</div>
                    </div>
                </div>
            `).join('');
        }

        // Open modal with Pokemon details
        function openModal(pokemonId) {
            const pokemon = allPokemons.find(p => p.id === pokemonId);
            if (!pokemon) return;

            document.getElementById('modalImage').src = pokemon.picture;
            document.getElementById('modalName').textContent = pokemon.name;
            document.getElementById('modalId').textContent = `#${pokemon.id}`;
            document.getElementById('modalHP').textContent = pokemon.hp;
            document.getElementById('modalCP').textContent = pokemon.cp;
            document.getElementById('modalCreated').textContent = new Date(pokemon.created).toLocaleString();
            
            const typesContainer = document.getElementById('modalTypes');
            typesContainer.innerHTML = pokemon.types.map(type => `
                <span class="type-badge ${typeColors[type] || ''}">${type}</span>
            `).join('');

            document.getElementById('pokemonModal').style.display = 'block';
        }

        // Close modal
        function closeModal() {
            document.getElementById('pokemonModal').style.display = 'none';
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('typeFilter').value = '';
            filteredPokemons = [...allPokemons];
            updateStats();
            renderPokemons();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);

        // Close modal when clicking outside
        window.addEventListener('click', (event) => {
            const modal = document.getElementById('pokemonModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });

        // Load pokemons on page load
        document.addEventListener('DOMContentLoaded', loadPokemons);
    </script>
</body>
</html>
